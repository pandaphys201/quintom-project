theory:
  classy:
    input_params: ['H0', 'omega_b', 'omega_cdm', 'lambda_qtm', 'delta_qtm']
    output_params: ['comov.snd.hrz.', 'ang.diam.dist.', 'comov.dist.', 'rs_rec', 'da_rec', 'theta_s_100', 'sigma8', 'w_qtm', 'Omega_qtm', 'Omega_m', 'age']
    path: /home/panda/class_monte/class_qtm
    extra_args:
      Omega_qtm: -1
      Omega_Lambda: 0
      Omega_fld: 0
      coupled_baryon_qtm: yes
      coupled_cdm_qtm: yes
      output: ''
      N_eff: 3.044
      N_ncdm: 1
      m_ncdm: 0.06

likelihood:
  bao.desi_2024_bao_all:
  cmb_distance_prior.CMB_Distance_Prior_wcdm:
    python_path: likelihood/
  sn.pantheonplusshoes:
    use_abs_mag: True

params:
  H0:
    prior: {min: 50, max: 90}
    ref: {dist: norm, loc: 67.4, scale: 0.5}
    proposal: 0.5
    latex: H_0
  omega_b:
    prior: {min: 0.005, max: 0.05}
    ref: {dist: norm, loc: 0.02196, scale: 0.00010}
    proposal: 0.00010
    latex: \Omega_b h^2
  omega_cdm:
    prior: {min: 0.05, max: 0.2}
    ref: {dist: norm, loc: 0.12, scale: 0.005}
    proposal: 0.005
    latex: \Omega_c h^2
  lambda_qtm:
    prior: {min: 0.0, max: 5.0}
    ref: {dist: norm, loc: 0.5, scale: 0.1}
    proposal: 0.1
    latex: \lambda_{\rm qtm}
  delta_qtm:
    prior: {min: -1, max: 1}
    ref: {dist: norm, loc: 0.1, scale: 0.05}
    proposal: 0.05
    latex: \delta_{\rm qtm}
  Mb:
    prior: {min: -20, max: -18}
    ref: {dist: norm, loc: -19.253, scale: 0.01}
    proposal: 0.01
    latex: M_b
  theta_s_100:
    derived: true
    latex: 100\theta_{\rm s}
  sigma8:
    derived: true
    latex: \sigma_8
  Omega_m:
    derived: true
    latex: \Omega_{\rm m}
  w_qtm:
    derived: true
    latex: w_{\rm qtm}
  Omega_qtm:
    derived: true
    latex: \Omega_{\rm qtm}
  age:
    derived: true
    latex: \text{Age [Gyr]}
  rs_rec:
    derived: true
    latex: r_s(z_{\rm rec}) \text{ [Mpc]}
  da_rec:
    derived: true
    latex: d_A(z_{\rm rec}) \text{ [Mpc]}
   
sampler:
  mcmc:
    burn_in: 0
    learn_proposal: true
    Rminus1_stop: 0.01

output: chains/quintom/DESI+CMB+SNIa+SH0ES/quintom_DESI+CMB+SNIa+SH0ES