theory:
  classy:
    input_params: ['theta_s_100', 'omega_b', 'omega_cdm']
    output_params: ['H0', 'sigma8', 'Omega_m', 'age']
    path: /home/panda/class_monte/class_qtm
    extra_args:
      coupled_baryon_qtm: no
      coupled_cdm_qtm: no
      Neff: 3.044
      N_ncdm: 1
      m_ncdm: 0.06

likelihood:
  bao.desi_2024_bao_all:

params:
  theta_s_100:
    prior: {dist: norm, loc: 1.04110, scale: 0.00053}
    ref: {dist: norm, loc: 1.04110, scale: 0.00010}
    proposal: 0.00010
    latex: 100\theta_{\rm s}
  omega_b:
    prior: {dist: norm, loc: 0.02218, scale: 0.00055}
    ref: {dist: norm, loc: 0.02196, scale: 0.00010}
    proposal: 0.00010
    latex: \Omega_b h^2
  omega_cdm:
    prior: {min: 0.05, max: 0.2}
    ref: {dist: norm, loc: 0.12, scale: 0.005}
    proposal: 0.005
    latex: \Omega_c h^2
  H0:
    derived: true
    latex: H_0
  sigma8:
    derived: true
    latex: \sigma_8
  Omega_m:
    derived: true
    latex: \Omega_{\rm m}
  age:
    derived: true
    latex: \text{Age [Gyr]}
   
sampler:
  mcmc:
    burn_in: 0
    learn_proposal: true
    Rminus1_stop: 0.01

output: chains/lcdm/DESI+BBN+theta/lcdm_DESI+BBN+theta