  H0:
    prior:
      min: 50
      max: 90
    ref:
      dist: norm
      loc: 67.4
      scale: 0.5
    proposal: 0.5
    latex: H_0
  omega_b:
    prior:
      min: 0.005
      max: 0.05
    ref:
      dist: norm
      loc: 0.02196
      scale: 0.0001
    proposal: 0.0001
    latex: \Omega_b h^2
    renames:
    - omegabh2
  Neff:
    prior:
      min: 2.0
      max: 4.0
    ref:
      dist: norm
      loc: 2.904
      scale: 0.1
    proposal: 0.1
    latex: N_{\rm eff}
  omega_cdm:
    prior:
      min: 0.05
      max: 0.2
    ref:
      dist: norm
      loc: 0.12
      scale: 0.005
    proposal: 0.005
    latex: \Omega_c h^2
    renames:
    - omegach2
  lambda_qtm:
    prior:
      min: 0.0
      max: 5.0
    ref:
      dist: norm
      loc: 0.5
      scale: 0.1
    proposal: 0.1
    latex: \lambda_{\rm qtm}
  delta_qtm:
