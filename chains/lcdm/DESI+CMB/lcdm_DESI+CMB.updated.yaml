theory:
  classy:
    path: /home/panda/class_monte/class_qtm
    speed: 0.2
    stop_at_error: false
    extra_args:
      coupled_baryon_qtm: false
      coupled_cdm_qtm: false
      Neff: 3.044
      N_ncdm: 1
      m_ncdm: 0.06
    ignore_obsolete: false
    renames:
      As: A_s
      ns: n_s
      nrun: alpha_s
      nrunrun: beta_s
      nt: n_t
      ntrun: alpha_t
      rdrag: rs_drag
      omegak: Omega_k
      omegal: Omega_Lambda
      w: w0_fld
      wa: wa_fld
      omegabh2: omega_b
      omegab: Omega_b
      omegach2: omega_cdm
      omegac: Omega_cdm
      omegam: Omega_m
      omegan: Omega_nu
      tau: tau_reio
      zrei: z_reio
      deltazrei: reionization_width
      helium_redshift: helium_fullreio_redshift
      helium_delta_redshift: helium_fullreio_width
      yhe: YHe
      yheused: YHe
    version: v3.3.4
    input_params:
    - H0
    - omega_b
    - omega_cdm
    output_params:
    - theta_s_100
    - sigma8
    - Omega_m
    - age
    - rs_rec
    - da_rec
likelihood:
  bao.desi_2024_bao_all:
    measurements_file: bao_data/desi_2024_gaussian_bao_ALL_GCcomb_mean.txt
    cov_file: bao_data/desi_2024_gaussian_bao_ALL_GCcomb_cov.txt
    rs_fid: 1
    aliases:
    - BAO
    speed: 2000
    type: BAO
    rs_rescale: null
    prob_dist: null
    invcov_file: null
    redshift: null
    observable_1: null
    observable_2: null
    observable_3: null
    grid_file: null
    stop_at_error: false
    version: null
    input_params: []
    output_params: []
  cmb_distance_prior.CMB_Distance_Prior_lcdm:
    type: []
    speed: -1
    stop_at_error: false
    version: null
    python_path: likelihood/
    input_params:
    - omega_b
    - omega_cdm
    output_params: []
params:
  H0:
    prior:
      min: 50
      max: 90
    ref:
      dist: norm
      loc: 67.4
      scale: 0.5
    proposal: 0.5
    latex: H_0
  omega_b:
    prior:
      min: 0.005
      max: 0.05
    ref:
      dist: norm
      loc: 0.02239
      scale: 0.0001
    proposal: 0.0001
    latex: \Omega_b h^2
    renames:
    - omegabh2
  omega_cdm:
    prior:
      min: 0.05
      max: 0.2
    ref:
      dist: norm
      loc: 0.12
      scale: 0.005
    proposal: 0.005
    latex: \Omega_c h^2
    renames:
    - omegach2
  theta_s_100:
    derived: true
    latex: 100\theta_{\rm s}
  sigma8:
    derived: true
    latex: \sigma_8
  Omega_m:
    derived: true
    latex: \Omega_{\rm m}
    renames:
    - omegam
  age:
    derived: true
    latex: \text{Age [Gyr]}
  rs_rec:
    derived: true
    latex: r_s(z_{\rm rec}) \text{ [Mpc]}
  da_rec:
    derived: true
    latex: d_A(z_{\rm rec}) \text{ [Mpc]}
  chi2__BAO:
    latex: \chi^2_\mathrm{BAO}
    derived: true
sampler:
  mcmc:
    sampler_type: mcmc
    supports_periodic_params: true
    burn_in: 0
    max_tries: 40d
    covmat: null
    covmat_params: null
    proposal_scale: 2.4
    output_every: 60s
    learn_every: 40d
    temperature: 1
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    learn_proposal_Rminus1_max_early: 30.0
    learn_proposal_Rminus1_min: 0.0
    max_samples: .inf
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2
    Rminus1_cl_level: 0.95
    Rminus1_single_split: 4
    measure_speeds: true
    oversample_power: 0.4
    oversample_thin: true
    drag: false
    blocking:
    - - 1
      - - H0
        - omega_b
        - omega_cdm
    callback_function: null
    callback_every: null
    seed: null
    check_every: null
    oversample: null
    drag_limits: null
    fallback_covmat_scale: 4
    version: 3.6.2
output: lcdm_DESI+CMB
version: 3.6.2
